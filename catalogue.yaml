- name: catalogue module
  hosts: catalogue
  become: yes
  tasks:
    - name: disable nodejs
      ansible.builtin.command: dnf module disable nodejs -y

    - name: enable nodejs:20
      ansible.builtin.command: dnf module enable nodejs:20 -y

    - name: Install nodejs on RedHat
      ansible.builtin.dnf:
        name: nodejs
        state: present

    - name: add user roboshop system user
      ansible.builtin.user:
        name: roboshop
        shell: /sbin/nologin
        system: true
        home: /app

    - name: create directory /app
      ansible.builtin.file:
        path: /app
        state: directory

    - name: download code from user
      ansible.builtin.get_url:
        url: "https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip"
        dest: "/tmp/catalogue.zip"

    - name: Unzip a remote file
      ansible.builtin.unarchive:
        src: /tmp/catalogue.zip
        dest: /app
        remote_src: yes

    - name: install dependencies
      community.general.npm:
        path: /app
        state: present

    - name: copy catalogue.service code to system directory
      ansible.builtin.copy:
        src: catalogue.service
        dest: /etc/systemd/system/catalogue.service

    - name: daemon-reload to pick up config changes
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: enable & start catalogue service
      ansible.builtin.service:
        name: catalogue
        enabled: true
        state: started

    - name: copy mongo.repo file
      ansible.builtin.copy:
        src: mongo.repo
        dest: /etc/yum.repos.d/mongo.repo

    - name: install mongosh client
      ansible.builtin.dnf:
        name: mongodb-mongosh
        state: present

    - name: check products loaded or not
      ansible.builtin.command: mongosh --host mongodb.daws-sunny.site --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
      register: catalogue_output

    - name: print catalogue output
      ansible.builtin.debug:
        msg: "{{ catalogue_output }}"

    - name: load products
      ansible.builtin.shell: mongosh --host mongodb.daws-sunny.site </app/db/master-data.js
      when: catalogue_output.stdout | int < 0
